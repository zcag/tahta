name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # objective floor: no hardcoded values, every used token defined
      - run: npm test
      # render every layout across all variants; fail on any blank/broken slide
      - run: npx playwright install --with-deps chromium
      - run: node packages/grade/cli.mjs examples/gallery/slides.md --variants editorial,brutalist,soft,minimal
